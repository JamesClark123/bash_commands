
[custom.merge_base]
command = 'git merge-base --fork-point main HEAD 2>/dev/null | cut -c1-7'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
format = '[merge-base: $output]($style) '
style = 'yellow'
description = 'Shows the merge base commit with main'

[git_status]
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
modified = '!${count}'
untracked = '?${count}'
staged = '[+${count}](green)'
